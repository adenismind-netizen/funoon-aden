<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اكتشفي نمط تعلقك العاطفي — فنون عدن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:   #FDF8F0;
  --cream2:  #FAF3E8;
  --gold:    #C8973A;
  --gold-lt: #F5E4BC;
  --gold-md: #E8C97A;
  --rose:    #C96B6B;
  --teal:    #4CA09A;
  --purple:  #8B6BA8;
  --dark:    #2C2416;
  --mid:     #5A4E3C;
  --gray:    #8A7E6E;
  --sand:    #EDE3D0;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--cream);
  color: var(--dark);
  direction: rtl;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ─── TOP BAR ─── */
.top-bar {
  width: 100%;
  background: var(--gold);
  text-align: center;
  padding: 10px 20px;
  font-size: 13px;
  color: #fff;
  font-weight: 700;
}

/* ─── HERO ─── */
.hero {
  width: 100%;
  max-width: 640px;
  padding: 48px 24px 32px;
  text-align: center;
}

.badge {
  display: inline-block;
  background: var(--gold-lt);
  color: var(--gold);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 50px;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

.hero h1 {
  font-size: clamp(28px, 7vw, 44px);
  font-weight: 900;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 16px;
}

.hero h1 span { color: var(--gold); }

.hero .subtitle {
  font-size: 16px;
  color: var(--mid);
  line-height: 1.75;
  max-width: 480px;
  margin: 0 auto 32px;
}

/* ─── PATTERNS ROW ─── */
.patterns {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}

.pat {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #fff;
  border-radius: 50px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

.pat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── FORM CARD ─── */
.form-card {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  border-radius: 20px;
  padding: 32px 28px;
  box-shadow: 0 8px 32px rgba(44,36,22,.10);
  border-top: 4px solid var(--gold);
}

.form-card .form-title {
  font-size: 20px;
  font-weight: 900;
  color: var(--dark);
  margin-bottom: 6px;
  text-align: center;
}

.form-card .form-sub {
  font-size: 13px;
  color: var(--gray);
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.6;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--mid);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--sand);
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  color: var(--dark);
  background: var(--cream);
  outline: none;
  transition: border-color .2s;
  text-align: right;
}

.form-group input:focus {
  border-color: var(--gold);
  background: #fff;
}

.form-group input::placeholder { color: var(--gray); }

.submit-btn {
  width: 100%;
  padding: 16px;
  background: var(--gold);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s, transform .15s;
  letter-spacing: 0.5px;
}

.submit-btn:hover { background: #b5822e; }
