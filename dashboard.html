<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脵聛脵聠脵聢脵聠 脴鹿脴炉脵聠 芒聙聰 脵聞脵聢脴颅脴漏 脴搂脵聞脵聟脴陋脴搂脴篓脴鹿脴漏</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root { --cream:#FDF8F0; --dark:#1C1410; --gold:#C8973A; --terra:#C4714A; --muted:#8A7A6A; --soft:#F5EFE6; --border:#EDE7DC; --green:#5A8A6A; --blue:#4A6CB3; --white:#fff; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',Arial,sans-serif;background:var(--cream);color:var(--dark);direction:rtl;min-height:100vh;}

.header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.brand{font-size:17px;font-weight:800;}
.brand span{color:var(--terra);}
.header-right{display:flex;align-items:center;gap:14px;}
.live-pill{display:flex;align-items:center;gap:6px;background:#EDFAF2;border-radius99px;padding:5px 12px;font-size:12px;color:var(--green);font-weight:600;}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%, 100%{opacity:1;}50%{opacity:0.3;}}
.update-meta{font-size:11px;color:var(--muted);text-align:center;}
.refresh-btn{background:var(--terra);color:white;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.refresh-btn:disabled{background:#C4B49A;cursor:not-allowed;}

.container{max-width:1080px;margin:0 auto;padding:24px 16px;}

.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center;}
.metric-icon{font-size:24px;margin-bottom:8px;}
.metric-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;letter-spacing:0.3px;}
.metric-value{font-size:34px;font-weight:800;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.c-gold{color:var(--gold);} .c-green{color:var(--green);} .c-terra{color:var(--terra);}

.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}

.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.p-label{font-size:13px;color:#4A3F35;}
.p-nums{font-size:13px;font-weight:700;}
.bar-wrap{height:10px;background:var(--soft);border-radius:99px;overflow:hidden;margin-bottom:16px;}
.bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.bg-green{background:var(--green);} .bg-gold{background:var(--gold);}
.progress-note{font-size:11px;color:var(--muted);}

.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:18px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
.chart-wrap{position:relative;height:200px;}

.bar-list{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.bar-item{display:flex;align-items:center;gap:10px;}
.bi-label{font-size:13px;color:#4A3F35;min-width:90px;}
.bi-bar-wrap{flex:1;height:8px;background:var(--soft);border-radius:99px;overflow:hidden;}
.bi-bar{height:100%;border-radius:99px;}
.bi-count{font-size:12px;color:var(--muted);min-width:28px;text-align:left;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:right;padding:8px 10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid var(--soft);color:#4A3F35;}
tr:last-child td{border-bottom:none;}

.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
.b-a{background:#FEF5EF;color:var(--terra);}
.b-b{background:#FEF9EC;color:var(--gold);}
.b-c{background:#EDFAF2;color:var(--green);}
.b-d{background:#E8F0FE;color:var(--blue);}
.b-yes{background:#EDFAF2;color:var(--green);}
.b-pend{background:#FEF9EC;color:var(--gold);}
.b-no{background:var(--soft);color:var(--muted);}

.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:15px;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--terra);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{color:var(--terra);text-align:center;padding:30px;font-size:14px;background:var(--white);border-radius:14px;border:1px solid var(--border);}
</style>
</head>
<body>

<div class="header">
  <div class="brand">脵聛脵聠脵聢脵聠 <span>脴鹿脴炉脵聠</span> 冒聼聦路 芒聙聰 脵聞脵聢脴颅脴漏 脴搂脵聞脵聟脴陋脴搂脴篓脴鹿脴漏</div>
  <div class="header-right">
    <div class="live-pill"><span class="live-dot"></span>脵聟脴篓脴搂脴麓脴卤</div>
    <div class="update-meta">
      <div id="lastUpdate">脴卢脴搂脴卤脵聤 脴搂脵聞脴陋脴颅脵聟脵聤脵聞...</div>
      <div id="countdown" style="color:var(--muted);font-size:11px;"></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)">冒聼聰聞 脴陋脴颅脴炉脵聤脴芦</button>
  </div>
</div>

<div class="container">
  <div id="root"><div class="loading"><span class="spinner"></span> 脴卢脴搂脴卤脵聤 脴卢脵聞脴篓 脴搂脵聞脴篓脵聤脴搂脵聠脴搂脴陋 脵聟脵聠 Supabase...</div></div>
</div>

<script>
const API = 'https://bjxrzdexgplgjptneomv.supabase.co/functions/v1/dashboard-api';
let chartLeads = null, chartPat = null, countdownInterval = null;
const INTERVAL = 300;
let secLeft = INTERVAL;

const PAT_LABEL = {A:'脵聜脵聟脵聜',B:'脴陋脵聛脴搂脴炉脵聤',C:'脵聟脴露脴路脴卤脴篓',D:'脴垄脵聟脵聠'};
const PAT_COLOR = {A:'#C4714A',B:'#C8973A',C:'#5A8A6A',D:'#4A6CB3'};
const PAT_CLASS = {A:'b-a',B:'b-b',C:'b-c',D:'b-d'};

function pct(a,b){return b>0?Math.round(a/b*100):0;}

async function loadAll(manual=false){
  const btn=document.getElementById('refreshBtn');
  if(btn){btn.disabled=true;btn.textContent='芒聫鲁';}
  try {
    const r=await fetch(API);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    render(d);
    const n=new Date();
    document.getElementById('lastUpdate').textContent=
      '脴垄脴庐脴卤 脴陋脴颅脴炉脵聤脴芦: '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    startCountdown();
  } catch(e){
    const root=document.getElementById('root');
    if(root.querySelector('.loading'))
      root.innerHTML='<div class="error">芒職聽茂赂聫 脴陋脴鹿脴掳脵聭脴卤 脴卢脵聞脴篓 脴搂脵聞脴篓脵聤脴搂脵聠脴搂脴陋 芒聙聰 '+e.message+'<br><br>脴陋脴颅脵聜脵聭脵聜脵聤 脵聟脵聠 脴搂脴陋脴碌脴搂脵聞 脴搂脵聞脴楼脵聠脴陋脴卤脵聠脴陋 脴芦脵聟 脴搂脴露脴潞脴路脵聤 脴陋脴颅脴炉脵聤脴芦.</div>';
  }
  if(btn){btn.disabled=false;btn.textContent='冒聼聰聞 脴陋脴颅脴炉脵聤脴芦';}
}

function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);
  secLeft=INTERVAL;
  countdownInterval=setInterval(()=>{
    secLeft--;
    const m=Math.floor(secLeft/60),s=secLeft%60;
    document.getElementById('countdown').textContent='脴陋脴颅脴炉脵聤脴芦 脴庐脵聞脴搂脵聞 '+m+':'+String(s).padStart(2,'0');
    if(secLeft<=0) loadAll(false);
  },1000);
}

function render(d){
  // Metrics
  const metricsHTML=`
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-icon">冒聼聭楼</div>
      <div class="metric-label">脴楼脴卢脵聟脴搂脵聞脵聤 脴搂脵聞脵聞脵聤脴炉脴虏</div>
      <div class="metric-value">${d.total}</div>
      <div class="metric-sub">+${d.thisWeek} 脵聡脴掳脴搂 脴搂脵聞脴拢脴鲁脴篓脵聢脴鹿</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">冒聼聦卤</div>
      <div class="metric-label">脴搂脵聞脵聤脵聢脵聟</div>
      <div class="metric-value c-gold">+${d.today}</div>
      <div class="metric-sub">脵聞脵聤脴炉 脴卢脴炉脵聤脴炉脴漏</div>
    </div>
    <div class="metric-card">
      <div class="metric-icon">芒聹聟</div>
      <div class="metric-label">脴篓脵聞脴搂脴鲁脴陋 脴搂脵聞脵聟脵聠脴碌脴漏 脴拢脵聫脴卤脴鲁脵聞</div>
      <div class="metric-value c-green">${d.blastSent}</div>
      <div class="metric-sub">${pct(d.blastSent,d.total)}% 脵聟脵聠 脴搂脵聞脴楼脴卢脵聟脴搂脵聞脵聤</div>
    </div>
  </div>`;

  // Progress
  const progressHTML=`
  <div class="card">
    <div class="card-title">冒聼聯陇 脴陋脵聜脴炉脵聟 脴篓脵聞脴搂脴鲁脴陋 脴搂脵聞脵聟脵聠脴碌脴漏 芒聙聰 脴卤脴鲁脴搂脴娄脵聞 脴炉脴鹿脵聢脴漏 aden-art.lovable.app</div>
    <div class="progress-row">
      <div class="p-label">脴拢脵聫脴卤脴鲁脵聞脴陋 芒聹聟</div>
      <div class="p-nums c-green">${d.blastSent} 脵聟脵聠 ${d.total} (${pct(d.blastSent,d.total)}%)</div>
    </div>
    <div class="bar-wrap"><div class="bar-fill bg-green" style="width:${pct(d.blastSent,d.total)}%"></div></div>
    <div class="progress-row">
      <div class="p-label">脵聟脴陋脴篓脵聜脵聤脴漏 芒聫鲁</div>
      <div class="p-nums c-gold">${d.blastPending} 脵聞脵聤脴炉</div>
    </div>
    <div class="bar-wrap"><div class="bar-fill bg-gold" style="width:${pct(d.blastPending,d.total)}%"></div></div>
    <div class="progress-note">芒職聶茂赂聫 platform-blast 脴陋脴鹿脵聟脵聞 脴陋脵聞脵聜脴搂脴娄脵聤脴搂脵聥 脵聝脵聞 10 脴炉脵聜脴搂脴娄脵聜 芒聙聰 7 脴卤脴鲁脴搂脴娄脵聞/脴炉脵聢脴卤脴漏 芒聙聰 脵聟脴颅脵聟脵聤脴漏 脵聟脵聠 脴搂脵聞脴陋脵聝脴卤脴搂脴卤</div>
  </div>`;

  // Sources
  const srcEntries=Object.entries(d.sources).sort((a,b)=>b[1]-a[1]);
  const maxSrc=srcEntries[0]?.[1]||1;
  const sourcesHTML=srcEntries.map(([src,cnt])=>`
    <div class="bar-item">
      <div class="bi-label">${src}</div>
      <div class="bi-bar-wrap"><div class="bi-bar" style="width:${pct(cnt,maxSrc)}%;background:var(--terra);"></div></div>
      <div class="bi-count">${cnt}</div>
    </div>`).join('');

  // Pattern bars
  const patHTML=Object.entries(d.patterns).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="bar-item">
      <div class="bi-label">${PAT_LABEL[k]||k} (${k})</div>
      <div class="bi-bar-wrap"><div class="bi-bar" style="width:${pct(v,d.total)}%;background:${PAT_COLOR[k]||'#888'};"></div></div>
      <div class="bi-count">${v}</div>
    </div>`).join('');

  // Table
  const tableRows=(d.recent||[]).map(l=>{
    const dt=new Date(l.date);
    const ds=`${dt.getDate()}/${dt.getMonth()+1} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const blastBadge=l.blast===true
      ?'<span class="badge b-yes">脴拢脵聫脴卤脴鲁脵聞</span>'
      :l.blast===false
        ?'<span class="badge b-no">脵聟脴颅脴卢脵聢脴虏</span>'
        :'<span class="badge b-pend">脵聟脴鹿脵聞脵聜</span>';
    const d0=l.day0?'<span class="badge b-yes">芒聹聯</span>':'<span class="badge b-no">芒聙聰</span>';
    return`<tr>
      <td>${l.name}</td>
      <td style="direction:ltr;text-align:right;font-size:12px;">${l.wa}</td>
      <td><span class="badge ${PAT_CLASS[l.pattern]||''}">${PAT_LABEL[l.pattern]||l.pattern}</span></td>
      <td>${l.source}</td>
      <td>${d0}</td>
      <td>${blastBadge}</td>
      <td style="color:var(--muted);font-size:11px;">${ds}</td>
    </tr>`;
  }).join('');

  document.getElementById('root').innerHTML=`
    ${metricsHTML}
    ${progressHTML}
    <div class="charts-grid">
      <div class="card" style="margin:0;">
        <div class="card-title">冒聼聯聢 脴搂脵聞脵聞脵聤脴炉脴虏 脴垄脴庐脴卤 14 脵聤脵聢脵聟</div>
        <div class="chart-wrap"><canvas id="cLeads"></canvas></div>
      </div>
      <div class="card" style="margin:0;">
        <div class="card-title">冒聼搂聽 脴陋脵聢脴虏脵聤脴鹿 脴搂脵聞脴拢脵聠脵聟脴搂脴路</div>
        <div class="chart-wrap"><canvas id="cPat"></canvas></div>
      </div>
    </div>
    <div class="two-col">
      <div class="card" style="margin:0;">
        <div class="card-title">冒聼聦聬 脴搂脵聞脵聟脴碌脴搂脴炉脴卤</div>
        <div class="bar-list">${sourcesHTML}</div>
      </div>
      <div class="card" style="margin:0;">
        <div class="card-title">冒聼聯聤 脴搂脵聞脴拢脵聠脵聟脴搂脴路</div>
        <div class="bar-list">${patHTML}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">冒聼聲聬 脴垄脴庐脴卤 20 脵聞脵聤脴炉</div>
      <table>
        <thead><tr><th>脴搂脵聞脴搂脴鲁脵聟</th><th>脴搂脵聞脵聢脴搂脴陋脴鲁脴搂脴篓</th><th>脴搂脵聞脵聠脵聟脴路</th><th>脴搂脵聞脵聟脴碌脴炉脴卤</th><th>脵聤脵聢脵聟 0</th><th>脴篓脵聞脴搂脴鲁脴陋</th><th>脴搂脵聞脴陋脴搂脴卤脵聤脴庐</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;

  // Charts
  const dailyEntries=Object.entries(d.daily);
  const labels=dailyEntries.map(([k])=>{const p=k.split('-');return p[2]+'/'+p[1];});
  const vals=dailyEntries.map(([,v])=>v);

  if(chartLeads) chartLeads.destroy();
  chartLeads=new Chart(document.getElementById('cLeads'),{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:'#C4714A',borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:0}},
              y:{grid:{color:'#F5EFE6'},ticks:{font:{size:10},stepSize:5},beginAtZero:true}}}
  });

  if(chartPat) chartPat.destroy();
  chartPat=new Chart(document.getElementById('cPat'),{
    type:'doughnut',
    data:{
      labels:['脵聜脵聞脵聜 (A)','脴陋脵聛脴搂脴炉脵聤 (B)','脵聟脴露脴路脴卤脴篓 (C)','脴垄脵聟脵聠 (D)'],
      datasets:[{data:[d.patterns.A,d.patterns.B,d.patterns.C,d.patterns.D],
        backgroundColor:['#C4714A','#C8973A','#5A8A6A','#4A6CB3'],borderWidth:0,hoverOffset:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',rtl:true,labels:{font:{size:11},boxWidth:12,padding:8}}}}
  });
}

loadAll(true);
</script>
</body>
</html>
